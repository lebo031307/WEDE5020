<body>

    <header>
        <img src="images/Crispy-hub-logo.png" alt="Crispy Hub Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>

            <a href="enquiries.html" class="active">Enquiries</a>
        </nav>
    </header>

    <main>
        <h1>Customer Enquiry Form</h1>
        <p>Please complete the form below and we will get back to you as soon as possible.</p>

        <form id="client-engagement-form" action="#" method="post">
            <fieldset>
                <legend>Your Personal Details</legend>
        
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="form-input-name" name="fullname" required><br><br>
        
                <label for="idnumber">ID Number:</label><br>
                <input type="text" id="form-input-id" name="idnumber" placeholder="For verification purposes"><br><br>
        
                <label for="email">Email Address:</label><br>
                <input type="email" id="form-input-email" name="email" required>
                <span class="form-error-msg" id="email-error-target"></span><br><br>
        
                <label for="phone">Contact Number:</label><br>
                <input type="tel" id="form-input-phone" name="phone" required><br><br>
            </fieldset>
        
            <fieldset>
                <legend>Enquiry Details</legend>
        
                <label for="enquirytype">--- Select Option ---</label><br>
                <select id="form-input-type" name="enquirytype" required>
                    <option value="">--- Select Option ---</option>
                    <option value="compliment">Compliment / Feedback</option>
                    <option value="complaint">Complaint</option>
                    <option value="store-experience">Store Experience</option>
                    <option value="product-query">Product Query</option>
                    <option value="delivery">Delivery / App Issue</option>
                    <option value="careers">Job Application / Careers</option>
                    <option value="marketing">Marketing / Sponsorship</option>
                    <option value="other">Other</option>
                </select><br><br>
        
                <label for="store">Which Store Did You Visit?</label><br>
                <select id="form-input-store" name="store">
                    <option value="">--- Select Store ---</option>
                    <option value="sandton">Sandton City</option>
                    <option value="menlyn">Menlyn Park</option>
                    <option value="canalwalk">Canal Walk</option>
                    <option value="gateway">Gateway Theatre</option>
                    <option value="other">Other / Not Applicable</option>
                </select><br><br>
        
                <label for="date">Date of Visit / Interaction:</label><br>
                <input type="date" id="form-input-date" name="date"><br><br>
        
                <label for="message">Please tell us more about your enquiry:</label><br>
                <textarea id="form-input-msg" name="message" rows="8" cols="50" required placeholder="Please provide as much detail as possible..."></textarea>
                <span class="form-error-msg" id="message-error-target"></span><br><br>
        
                <button type="submit">Submit Enquiry</button>
                <div id="submission-toast-feedback" class="toast-feedback"></div>
            </fieldset>
        </form>    
    </main>
